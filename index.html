<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Витражи привычек</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .goal {
            background: rgba(255,255,255,0.1);
            padding: 12px 20px;
            border-radius: 30px;
            display: inline-block;
            backdrop-filter: blur(10px);
        }

        .goal h2 {
            color: #fff;
            font-size: 18px;
            font-weight: 500;
        }

        .goal p {
            color: #aaa;
            font-size: 12px;
            margin-top: 4px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            background: #0f0f1a;
            padding: 16px;
            border-radius: 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 24px;
        }

        .shard {
            aspect-ratio: 1 / 1;
            background: #2d2d44;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: rgba(255,255,255,0.3);
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2), 0 2px 4px rgba(0,0,0,0.2);
        }

        .shard.colored {
            background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            color: white;
            box-shadow: 0 0 12px rgba(255,107,107,0.5);
        }

        .stats {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .stats p {
            color: #ddd;
            font-size: 14px;
        }

        .stats .completed {
            font-size: 32px;
            font-weight: bold;
            color: #feca57;
        }

        .reset-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: #ff6b6b;
            padding: 10px 20px;
            border-radius: 30px;
            margin-top: 12px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
        }

        .habit-input {
            margin-top: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 16px;
        }

        .habit-input input {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            background: #2d2d44;
            color: white;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .habit-input button {
            background: #feca57;
            border: none;
            padding: 10px;
            border-radius: 30px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="goal">
                <h2>🎯 Наладить сон</h2>
                <p>Каждый осколок — одно действие</p>
            </div>
        </div>

        <div class="grid" id="stainedGlassGrid"></div>

        <div class="stats">
            <p>Собрано осколков</p>
            <p class="completed" id="completedCount">0</p>
            <p>из 16</p>
            <button class="reset-btn" id="resetBtn">🔄 Сбросить витраж</button>
        </div>

        <div class="habit-input">
            <input type="text" id="habitInput" placeholder="Что сделаешь сегодня? Например, «Выключить телефон за час до сна»">
            <button id="addHabitBtn">✨ Добавить действие на сегодня</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const TOTAL_SHARDS = 16;
        
        let coloredShards = loadProgress();
        
        const gridContainer = document.getElementById('stainedGlassGrid');
        const completedSpan = document.getElementById('completedCount');
        
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();
        
        function saveProgress() {
            localStorage.setItem('virazh_shards', JSON.stringify(coloredShards));
        }
        
        function loadProgress() {
            const saved = localStorage.getItem('virazh_shards');
            if (saved) {
                return JSON.parse(saved);
            }
            return new Array(TOTAL_SHARDS).fill(false);
        }
        
        function countColored() {
            return coloredShards.filter(v => v === true).length;
        }
        
        function updateUI() {
            const completed = countColored();
            completedSpan.textContent = completed;
            
            tg.MainButton.setText(`🎨 Прогресс: ${completed}/${TOTAL_SHARDS}`);
            if (completed === TOTAL_SHARDS) {
                tg.MainButton.setParams({ color: '#feca57', text_color: '#1a1a2e' });
                tg.MainButton.setText('🏆 Витраж готов! Поделиться');
                tg.MainButton.show();
            } else {
                tg.MainButton.hide();
            }
            
            renderGrid();
        }
        
        function renderGrid() {
            gridContainer.innerHTML = '';
            for (let i = 0; i < TOTAL_SHARDS; i++) {
                const shard = document.createElement('div');
                shard.className = 'shard';
                if (coloredShards[i]) {
                    shard.classList.add('colored');
                    shard.textContent = '✨';
                } else {
                    shard.textContent = '🔮';
                }
                shard.onclick = (function(index) {
                    return function() { shardClick(index); };
                })(i);
                gridContainer.appendChild(shard);
            }
        }
        
        function shardClick(index) {
            if (coloredShards[index]) {
                tg.HapticFeedback.impactOccurred('light');
                tg.showPopup({
                    title: 'Уже собрано',
                    message: 'Этот осколок уже цветёт! Выполни другое действие.',
                    buttons: [{type: 'ok'}]
                });
                return;
            }
            
            coloredShards[index] = true;
            saveProgress();
            tg.HapticFeedback.impactOccurred('medium');
            updateUI();
            
            if (countColored() === TOTAL_SHARDS) {
                tg.showPopup({
                    title: '🎉 Поздравляем!',
                    message: 'Ты собрал полный витраж! Новая привычка сформирована. Начни новую цель в следующем витраже.',
                    buttons: [{type: 'ok'}]
                });
            }
        }
        
        function resetVitrage() {
            tg.showPopup({
                title: 'Сбросить витраж?',
                message: 'Все осколки станут серыми. Прогресс по этой цели потеряется.',
                buttons: [
                    {id: 'cancel', type: 'cancel'},
                    {id: 'reset', type: 'destructive', text: 'Сбросить'}
                ]
            }, (buttonId) => {
                if (buttonId === 'reset') {
                    coloredShards = new Array(TOTAL_SHARDS).fill(false);
                    saveProgress();
                    updateUI();
                    tg.HapticFeedback.notificationOccurred('error');
                }
            });
        }
        
        function addHabit() {
            const input = document.getElementById('habitInput');
            const text = input.value.trim();
            if (!text) {
                tg.showPopup({
                    title: 'Напиши действие',
                    message: 'Что именно ты сделаешь сегодня для своей цели?',
                    buttons: [{type: 'ok'}]
                });
                return;
            }
            
            let habits = JSON.parse(localStorage.getItem('virazh_habits') || '[]');
            habits.push({
                text: text,
                date: new Date().toISOString().split('T')[0],
                completed: false
            });
            localStorage.setItem('virazh_habits', JSON.stringify(habits));
            
            tg.showPopup({
                title: 'Готово!',
                message: `Действие «${text}» добавлено. Выполни его — и закрась осколок.`,
                buttons: [{type: 'ok'}]
            });
            input.value = '';
            tg.HapticFeedback.notificationOccurred('success');
        }
        
        renderGrid();
        updateUI();
        
        document.getElementById('resetBtn').onclick = resetVitrage;
        document.getElementById('addHabitBtn').onclick = addHabit;
        
        tg.MainButton.onClick(() => {
            if (countColored() === TOTAL_SHARDS) {
                tg.showPopup({
                    title: 'Поделиться победой',
                    message: 'Скопируй ссылку и отправь друзьям!',
                    buttons: [{type: 'ok'}]
                });
            }
        });
        
        tg.ready();
    </script>
</body>
</html>
